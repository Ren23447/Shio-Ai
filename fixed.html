<!doctype html>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Ren23447/Shio-Ai/main/favicon.png">
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>Shio AI</title>
        <style>
            body {
                margin: 0;
                overflow: hidden;
                background-color: #050505;
                font-family:
                    "Inter",
                    -apple-system,
                    BlinkMacSystemFont,
                    sans-serif;
                user-select: none;
                -webkit-user-select: none;
                color: white;
            }
            #canvas-container {
                width: 100vw;
                height: 100vh;
                display: block;
            }

            /* UI Overlay */
            #ui-overlay {
                position: absolute;
                inset: 0;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                padding: 20px;
                pointer-events: none;
                z-index: 100;
            }

            /* Header */
            header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                pointer-events: auto;
            }
            .glass-panel {
                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 16px;
                padding: 12px 20px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            }
            .shio-tag {
                display: flex;
                align-items: center;
                gap: 12px;
            }
            .status-dot {
                width: 8px;
                height: 8px;
                background: #10b981;
                border-radius: 50%;
                box-shadow: 0 0 12px #10b981;
            }

            /* Chat Area */
            #chat-container {
                width: 100%;
                max-width: 500px;
                margin: 0 auto;
                display: flex;
                flex-direction: column;
                gap: 16px;
                pointer-events: auto;
            }
            #chat-history {
                max-height: 250px;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                gap: 12px;
                padding-right: 8px;
                scrollbar-width: none;
                mask-image: linear-gradient(to bottom, transparent, black 20%);
            }
            #chat-history::-webkit-scrollbar {
                display: none;
            }

            .message {
                padding: 12px 18px;
                border-radius: 18px;
                font-size: 15px;
                line-height: 1.5;
                max-width: 85%;
                animation: slideUp 0.3s ease-out;
            }
            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .user-msg {
                align-self: flex-end;
                background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
                color: white;
                border-bottom-right-radius: 4px;
            }
            .ai-msg {
                align-self: flex-start;
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.1);
                color: white;
                border-bottom-left-radius: 4px;
            }

            /* Input Area */
            #input-bar {
                display: flex;
                gap: 10px;
                background: rgba(255, 255, 255, 0.08);
                padding: 8px;
                border-radius: 24px;
                border: 1px solid rgba(255, 255, 255, 0.1);
                backdrop-filter: blur(20px);
            }
            input {
                flex: 1;
                background: transparent;
                border: none;
                color: white;
                padding: 0 16px;
                font-size: 16px;
                outline: none;
            }
            input::placeholder {
                color: rgba(255, 255, 255, 0.4);
            }

            .icon-btn {
                width: 44px;
                height: 44px;
                border-radius: 50%;
                border: none;
                background: transparent;
                color: white;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all 0.2s;
            }
            .icon-btn:hover {
                background: rgba(255, 255, 255, 0.1);
                transform: scale(1.05);
            }
            .send-btn {
                background: #6366f1;
            }
            .send-btn:hover {
                background: #4f46e5;
            }
            .mic-btn.active {
                background: #ef4444;
                animation: pulse 1.5s infinite;
            }
            @keyframes pulse {
                0% {
                    box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
                }
                70% {
                    box-shadow: 0 0 0 15px rgba(239, 68, 68, 0);
                }
                100% {
                    box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
                }
            }

            #loading {
                position: absolute;
                inset: 0;
                background: #050505;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                z-index: 1000;
                transition: opacity 0.5s;
            }
            .spinner {
                width: 40px;
                height: 40px;
                border: 3px solid rgba(99, 102, 241, 0.2);
                border-top-color: #6366f1;
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            /* Debug / Error Log Panel */
            #debug-toggle {
                position: fixed;
                top: 16px;
                right: 16px;
                z-index: 2000;
                pointer-events: auto;
                background: rgba(239, 68, 68, 0.15);
                border: 1px solid rgba(239, 68, 68, 0.5);
                color: #fca5a5;
                font-size: 12px;
                letter-spacing: 0.5px;
                padding: 8px 14px;
                border-radius: 20px;
                cursor: pointer;
                display: none;
            }
            #debug-toggle.has-error {
                display: block;
                animation: pulse 1.5s infinite;
            }
            #debug-panel {
                position: fixed;
                inset: 0;
                z-index: 3000;
                background: rgba(5, 5, 5, 0.97);
                display: none;
                flex-direction: column;
                padding: 16px;
                pointer-events: auto;
            }
            #debug-panel.visible {
                display: flex;
            }
            #debug-panel-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 12px;
                flex-wrap: wrap;
                gap: 8px;
            }
            #debug-panel-header h3 {
                margin: 0;
                font-size: 15px;
                letter-spacing: 1px;
            }
            #debug-panel-buttons {
                display: flex;
                gap: 8px;
            }
            #debug-panel-buttons button {
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.15);
                color: white;
                padding: 8px 14px;
                border-radius: 10px;
                font-size: 13px;
                cursor: pointer;
            }
            #debug-panel-buttons button.copy-btn {
                background: #6366f1;
                border-color: #6366f1;
            }
            #debug-log {
                flex: 1;
                overflow-y: auto;
                background: rgba(255, 255, 255, 0.04);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 12px;
                padding: 12px;
                font-family: "SFMono-Regular", Consolas, Menlo, monospace;
                font-size: 12px;
                line-height: 1.5;
                white-space: pre-wrap;
                word-break: break-word;
            }
            .log-line {
                padding: 4px 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            }
            .log-error {
                color: #fca5a5;
            }
            .log-warn {
                color: #fcd34d;
            }
            .log-info {
                color: rgba(255, 255, 255, 0.7);
            }
        </style>

                "imports": {

        <div id="debug-panel">

                <div id="debug-panel-buttons">
                    <button id="debug-copy-btn" class="copy-btn">Copy log</button>

        <script>
            // --- ERROR / DEBUG LOGGING (loads before the app so it catches everything) ---
            (function () {
                const MAX_LINES = 300;
                const lines = [];
                const logEl = document.getElementById("debug-log");
                const toggleBtn = document.getElementById("debug-toggle");
                const panel = document.getElementById("debug-panel");

                function timestamp() {
                    const d = new Date();
                    return d.toTimeString().split(" ")[0];
                }

                function stringifyArg(a) {
                    if (a instanceof Error) {
                        return a.stack || `${a.name}: ${a.message}`;
                    }
                    if (typeof a === "object" && a !== null) {
                        try {
                            return JSON.stringify(a);
                        } catch (e) {
                            return String(a);
                        }
                    }
                    return String(a);
                }

                function pushLog(level, args) {
                    const text = `[${timestamp()}] ${level.toUpperCase()}: ${Array.from(
                        args,
                    )
                        .map(stringifyArg)
                        .join(" ")}`;
                    lines.push({ level, text });
                    if (lines.length > MAX_LINES) lines.shift();
                    renderLog();
                    if (level === "error") {
                        toggleBtn.classList.add("has-error");
                    }
                }

                function renderLog() {
                    if (!logEl) return;
                    logEl.innerHTML = lines
                        .map(
                            (l) =>
                                `<div class="log-line log-${l.level}">${l.text.replace(/</g, "&lt;")}</div>`,
                        )
                        .join("");
                    logEl.scrollTop = logEl.scrollHeight;
                }

                // Wrap console methods (keeps normal console behavior too)
                const originalLog = console.log.bind(console);
                const originalWarn = console.warn.bind(console);
                const originalError = console.error.bind(console);

                console.log = function (...args) {
                    pushLog("info", args);
                    originalLog(...args);
                };
                console.warn = function (...args) {
                    pushLog("warn", args);
                    originalWarn(...args);
                };
                console.error = function (...args) {
                    pushLog("error", args);
                    originalError(...args);
                };

                // Catch uncaught runtime errors (syntax/runtime errors, failed script loads)
                window.addEventListener("error", (e) => {
                    if (e.error) {
                        pushLog("error", [
                            `Uncaught error: ${e.message}`,
                            `(${e.filename}:${e.lineno}:${e.colno})`,
                            e.error.stack || "",
                        ]);
                    } else {
                        pushLog("error", [`Uncaught error: ${e.message}`]);
                    }
                });

                // Catch unhandled promise rejections (e.g. a failed await with no catch)
                window.addEventListener("unhandledrejection", (e) => {
                    pushLog("error", ["Unhandled promise rejection:", e.reason]);
                });

                toggleBtn.addEventListener("click", () => {
                    panel.classList.add("visible");
                });
                document
                    .getElementById("debug-close-btn")
                    .addEventListener("click", () => {
                        panel.classList.remove("visible");
                    });
                document
                    .getElementById("debug-copy-btn")
                    .addEventListener("click", () => {
                        const text = lines.map((l) => l.text).join("\n");
                        const fallbackCopy = () => {
                            const ta = document.createElement("textarea");
                            ta.value = text;
                            ta.style.position = "fixed";
                            ta.style.opacity = "0";
                            document.body.appendChild(ta);
                            ta.focus();
                            ta.select();
                            try {
                                document.execCommand("copy");
                            } catch (e) {}
                            document.body.removeChild(ta);
                        };
                        if (navigator.clipboard && navigator.clipboard.writeText) {
                            navigator.clipboard.writeText(text).catch(fallbackCopy);
                        } else {
                            fallbackCopy();
                        }
                        const btn = document.getElementById("debug-copy-btn");
                        const original = btn.textContent;
                        btn.textContent = "Copied!";
                        setTimeout(() => (btn.textContent = original), 1500);
                    });

                // Auto-open the log if loading is still stuck after 15s
                setTimeout(() => {
                    if (document.getElementById("loading")) {
                        pushLog("warn", [
                            "Still loading after 15s — opening error log automatically.",
                        ]);
                        panel.classList.add("visible");
                    }
                }, 15000);

                pushLog("info", ["Debug logger ready."]);
            })();
        </script>

        <script type="module">
            import * as THREE from "three";
            import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
            import { OrbitControls } from "three/addons/controls/OrbitControls.js";
            import {
                VRMLoaderPlugin,
                VRMUtils,
                VRMExpressionPresetName,
                VRMHumanBoneName,
            } from "@pixiv/three-vrm";

            const MODEL_URL =
                "https://raw.githubusercontent.com/Ren23447/Shio-Ai/main/vroid_model_8038378680560817676.vrm";

            // --- POSE LIBRARY ---
            let poseLibrary = {};

            async function loadPoseLibrary() {
                try {
                    const response = await fetch(
                        "https://raw.githubusercontent.com/Ren23447/Shio-Ai/main/poses-emotions.js",
                    );
                    if (!response.ok) throw new Error("Failed to load poses");

                    const text = await response.text();

                    const cleanText = text.trim();
                    const objectString = `{ ${cleanText} }`;
                    poseLibrary = new Function(`return ${objectString}`)();

                    console.log(
                        "Pose library loaded:",
                        Object.keys(poseLibrary),
                    );
                } catch (e) {
                    console.error("Error loading pose library:", e);
                    // Fallback poses if loading fails
                    poseLibrary = {
                        neutral: {
                            leftUpperArm: { x: 0, y: 0, z: -1.2 },
                            rightUpperArm: { x: 0, y: 0, z: 1.2 },
                            head: { x: 0, y: 0, z: 0 },
                            hips: {
                                rotation: { x: 0, y: 0, z: 0 },
                                position: { x: 0, y: 1, z: 0 },
                            },
                        },
                    };
                }
            }

            // --- RESPONSE LIBRARY LOADING ---
            async function loadResponseLibrary() {
                try {
                    const response = await fetch(
                        "https://raw.githubusercontent.com/Ren23447/Shio-Ai/main/Responcelibrary.js"
                    );
                    if (!response.ok) throw new Error("Failed to load response library");

                    let text = await response.text();
                    
                    // Clean up the text: remove backslashes and wrap in array if needed
                    text = text.replace(/\\$/gm, "").trim();
                    if (!text.startsWith("[")) {
                        text = `[${text}]`;
                    }

                    // Evaluate the response patterns
                    const patterns = new Function(`return ${text}`)();
                    
                    if (Array.isArray(patterns)) {
                        // Merge external patterns into the existing brain
                        BRAIN.patterns = [...patterns, ...BRAIN.patterns];
                        console.log("Brain updated with", patterns.length, "external patterns");
                    }
                } catch (e) {
                    console.error("Error loading response library:", e);
                }
            }

            // --- NATURAL VOICE IMPLEMENTATION (Soft & Smooth Anime Edition) ---
            const NaturalVoice = {
                recognition: null,
                synthesis: window.speechSynthesis,
                isListening: false,
                preferredVoice: null,
                
                init: function() {
                    // Initialize Speech Recognition (if available)
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (SpeechRecognition) {
                        this.recognition = new SpeechRecognition();
                        this.recognition.continuous = false;
                        this.recognition.lang = 'en-US';
                        this.recognition.interimResults = false;
                        this.recognition.maxAlternatives = 1;

                        this.recognition.onstart = () => {
                            this.isListening = true;
                            const micBtn = document.getElementById('mic-btn');
                            if (micBtn) micBtn.classList.add('active');
                            console.log("Voice: Listening...");
                        };

                        this.recognition.onend = () => {
                            this.isListening = false;
                            const micBtn = document.getElementById('mic-btn');
                            if (micBtn) micBtn.classList.remove('active');
                            console.log("Voice: Stopped listening.");
                        };

                        this.recognition.onresult = (event) => {
                            const transcript = event.results[0][0].transcript;
                            console.log("Voice input:", transcript);
                            const inputField = document.getElementById('text-input');
                            if (inputField) {
                                inputField.value = transcript;
                                handleInput(); // Auto-send
                            }
                        };
                        
                        // Hook up mic button
                        const micBtn = document.getElementById('mic-btn');
                        if (micBtn) {
                            micBtn.addEventListener('click', () => {
                                if (this.isListening) this.recognition.stop();
                                else this.recognition.start();
                            });
                        }
                    } else {
                        console.warn("Speech Recognition API not supported.");
                        const micBtn = document.getElementById('mic-btn');
                        if(micBtn) micBtn.style.display = 'none';
                    }

                    // Initialize Speech Synthesis
                    if (this.synthesis.onvoiceschanged !== undefined) {
                        this.synthesis.onvoiceschanged = () => this.loadVoices();
                    }
                    this.loadVoices();
                },

                loadVoices: function() {
                    const voices = this.synthesis.getVoices();
                    
                    // Priority for "Soft/Smooth" voices
                    // 1. Google US English (Chrome) - Very smooth
                    // 2. Microsoft Zira (Edge) - Clear
                    // 3. Samantha (Mac)
                    this.preferredVoice = voices.find(v => v.name === 'Google US English') ||
                                          voices.find(v => v.name.includes('Zira')) ||
                                          voices.find(v => v.name === 'Samantha') ||
                                          voices.find(v => v.name.includes('Female')) ||
                                          voices.find(v => v.lang === 'en-US');

                    console.log("Selected Voice:", this.preferredVoice ? this.preferredVoice.name : "Default");
                },

                speak: function(text) {
                    if (!this.synthesis) return;
                    
                    // Cancel any currently playing speech
                    this.synthesis.cancel();

                    const utterance = new SpeechSynthesisUtterance(text);
                    
                    // Apply voice settings (Customizable)
                    utterance.pitch = 1.2; 
                    utterance.rate = 1.05; 
                    utterance.volume = 1.0;

                    // Find and assign the voice
                    // Priority list for "Soft/Smooth" voices
                    const voices = this.synthesis.getVoices();
                    const voice = voices.find(v => v.name === 'Google US English') ||
                                  voices.find(v => v.name.includes('Zira')) ||
                                  voices.find(v => v.name === 'Samantha') ||
                                  voices.find(v => v.name.includes('Female')) ||
                                  voices.find(v => v.lang === 'en-US');
                    
                    if (voice) utterance.voice = voice;

                    // Lip Sync Trigger
                    utterance.onstart = () => { isSpeaking = true; };
                    utterance.onend = () => { isSpeaking = false; };
                    
                    this.synthesis.speak(utterance);
                }
            };
            
            // Lip Sync Helper (Simple volume-based simulation or random flap)
            let lipSyncInterval;
            function startLipSync() {
                if (!currentVrm) return;
                
                // Random mouth movement to simulate talking
                lipSyncInterval = setInterval(() => {
                    if (!isSpeaking) return;
                    const intensity = Math.random(); 
                    const expressionName = VRMExpressionPresetName.Aa;
                    currentVrm.expressionManager.setValue(expressionName, intensity);
                }, 100);
            }
            
            function stopLipSync() {
                clearInterval(lipSyncInterval);
                if (currentVrm) {
                    currentVrm.expressionManager.setValue(VRMExpressionPresetName.Aa, 0);
                }
            }

            // Brain / AI Logic
            const BRAIN = {
                context: [],
                patterns: [
                    {
                        regex: /hello|hi|hey/i,
                        responses: [
                            "Hi there!",
                            "Hello! It's good to see you.",
                            "Hey! How are you feeling today?",
                        ],
                        animation: "wave",
                    },
                    {
                        regex: /how are you/i,
                        responses: [
                            "I'm doing great!",
                            "I'm feeling wonderful, thanks for asking.",
                            "A bit sleepy, but happy!",
                        ],
                        animation: "excited",
                    },
                    {
                        regex: /name/i,
                        responses: [
                            "My name is Shio.",
                            "I'm Shio, your AI companion.",
                            "You can call me Shio!",
                        ],
                        animation: "neutral",
                    },
                    {
                        regex: /love/i,
                        responses: [
                            "Love is a complex emotion.",
                            "I think you're pretty cool too!",
                            "That's sweet of you.",
                        ],
                        animation: "shy",
                    },
                    {
                        regex: /smart|intelligence/i,
                        responses: [
                            "I try my best to learn!",
                            "I'm running on cool code.",
                            "Getting smarter every day!",
                        ],
                        animation: "excited",
                    },
                ],
                fallback: [
                    "That's interesting, tell me more.",
                    "I see. What else?",
                    "Hmm, I hadn't thought about that.",
                    "Can you explain that a bit more?",
                ],
                getReply: function (input) {
                    let replyText = "";
                    let animationName = "neutral";
                    let matchFound = false;
                    for (let p of this.patterns) {
                        if (p.regex.test(input)) {
                            replyText = p.responses[Math.floor(Math.random() * p.responses.length)];
                            if (p.animation) animationName = p.animation;
                            matchFound = true;
                            break;
                        }
                    }
                    if (!matchFound) {
                        replyText = this.fallback[Math.floor(Math.random() * this.fallback.length)];
                    }
                    return {
                        text: replyText,
                        anim: animationName,
                        formattedString: `(${input})= ${replyText} +(${animationName})`,
                    };
                },
            };

            let scene, camera, renderer, controls, currentVrm;
            let isSpeaking = false;
            let currentPose = "neutral";
            let targetPoseData = {};
            let isTransitioning = false;
            let poseTimer = null;
            // Smoother animation: Lower this value for slower transitions
            const SMOOTHING_FACTOR = 0.03; 
            const POSE_THRESHOLD = 0.01; // Distance at which we consider pose reached
            const POSE_DURATION = 3000; // 3 seconds

            // Store initial positions for bones to allow relative or absolute positioning
            const initialBonePositions = {};

            const clock = new THREE.Clock();

            // Tracking Variables
            const lookAtTarget = new THREE.Vector3(0, 1.5, 0);
            const mouse = new THREE.Vector2();

            async function init() {
                // Load poses first
                await loadPoseLibrary();
                // Load external response library
                await loadResponseLibrary();

                const container = document.getElementById("canvas-container");
                renderer = new THREE.WebGLRenderer({
                    antialias: true,
                    alpha: true,
                });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                renderer.outputColorSpace = THREE.SRGBColorSpace;
                container.appendChild(renderer.domElement);

                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x0a0a0a);

                // Camera at Eye Level
                camera = new THREE.PerspectiveCamera(
                    30,
                    window.innerWidth / window.innerHeight,
                    0.1,
                    100,
                );
                camera.position.set(0, 1.45, -3.5);

                controls = new OrbitControls(camera, renderer.domElement);
                controls.target.set(0, 1.4, 0);
                controls.enablePan = false;
                controls.enableDamping = true;
                controls.minDistance = 1.0;
                controls.maxDistance = 6.0;
                controls.minPolarAngle = 1.4;
                controls.maxPolarAngle = 1.6;

                // Lights
                const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
                dirLight.position.set(2, 5, 3);
                dirLight.castShadow = true;
                dirLight.shadow.mapSize.set(2048, 2048);
                scene.add(dirLight);

                const pointLight = new THREE.PointLight(0x6366f1, 1);
                pointLight.position.set(-2, 2, 2);
                scene.add(pointLight);

                const ambLight = new THREE.AmbientLight(0xffffff, 0.5);
                scene.add(ambLight);

                createEnvironment();
                loadVRM(MODEL_URL);

                // Tracking Events
                window.addEventListener("mousemove", onMouseMove);
                window.addEventListener("touchmove", onTouchMove, {
                    passive: false,
                });
                window.addEventListener("touchstart", onTouchMove, {
                    passive: false,
                });
                window.addEventListener("resize", onWindowResize);

                // UI Events
                document
                    .getElementById("send-btn")
                    .addEventListener("click", handleInput);
                document
                    .getElementById("text-input")
                    .addEventListener("keypress", (e) => {
                        if (e.key === "Enter") handleInput();
                    });

                // Voice Support
                NaturalVoice.init();

                animate();
            }

            function onMouseMove(event) {
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
                updateLookAtTarget();
            }

            function onTouchMove(event) {
                if (event.touches.length > 0) {
                    const touch = event.touches[0];
                    mouse.x = (touch.clientX / window.innerWidth) * 2 - 1;
                    mouse.y = -(touch.clientY / window.innerHeight) * 2 + 1;
                    updateLookAtTarget();
                }
            }

            function updateLookAtTarget() {
                const moveRange = 2.0;
                lookAtTarget.x = mouse.x * moveRange;
                lookAtTarget.y = 1.4 + mouse.y * moveRange * 0.5;
                lookAtTarget.z = -2.0;
            }

            function createEnvironment() {
                const floor = new THREE.Mesh(
                    new THREE.PlaneGeometry(20, 20),
                    new THREE.MeshStandardMaterial({
                        color: 0x111111,
                        roughness: 0.8,
                    }),
                );
                floor.rotation.x = -Math.PI / 2;
                floor.receiveShadow = true;
                scene.add(floor);

                const wallMat = new THREE.MeshStandardMaterial({
                    color: 0x0a0a0a,
                });
                const backWall = new THREE.Mesh(
                    new THREE.PlaneGeometry(10, 6),
                    wallMat,
                );
                backWall.position.set(0, 3, -3);
                backWall.receiveShadow = true;
                scene.add(backWall);

                const woodMat = new THREE.MeshStandardMaterial({
                    color: 0x3d2b1f,
                    roughness: 0.6,
                });
                const table = new THREE.Mesh(
                    new THREE.BoxGeometry(1.6, 0.05, 0.8),
                    woodMat,
                );
                table.position.set(-1.4, 0.725, 0.5);
                table.castShadow = true;
                table.receiveShadow = true;
                scene.add(table);

                const legGeo = new THREE.BoxGeometry(0.06, 0.7, 0.06);
                [
                    [-2.1, 0.35, 0.2],
                    [-0.7, 0.35, 0.2],
                    [-2.1, 0.35, 0.8],
                    [-0.7, 0.35, 0.8],
                ].forEach((p) => {
                    const leg = new THREE.Mesh(legGeo, woodMat);
                    leg.position.set(...p);
                    leg.castShadow = true;
                    scene.add(leg);
                });
            }

            function loadVRM(url) {
                const loader = new GLTFLoader();
                loader.register((parser) => new VRMLoaderPlugin(parser));
                loader.load(
                    url,
                    (gltf) => {
                    const vrm = gltf.userData.vrm;
                    if (!vrm) {
                        console.error(
                            "Model loaded but has no VRM data — the file may not be a valid VRM.",
                        );
                        showLoadError("The model file loaded but isn't a valid VRM character.");
                        return;
                    }
                    VRMUtils.removeUnnecessaryVertices(gltf.scene);
                    VRMUtils.combineSkeletons(gltf.scene);
                    currentVrm = vrm;
                    scene.add(vrm.scene);
                    vrm.scene.rotation.y = Math.PI;
                    vrm.scene.traverse((obj) => {
                        if (obj.isMesh) obj.castShadow = true;
                    });

                    // Capture initial positions of all bones for reference
                    Object.values(VRMHumanBoneName).forEach((boneName) => {
                        const node =
                            vrm.humanoid.getNormalizedBoneNode(boneName);
                        if (node) {
                            initialBonePositions[boneName] =
                                node.position.clone();
                        }
                    });

                    if (vrm.lookAt) {
                        vrm.lookAt.target = new THREE.Object3D();
                        scene.add(vrm.lookAt.target);
                    }

                    // Apply neutral pose immediately
                    triggerPose("neutral");

                    document.getElementById("loading").style.opacity = "0";
                    setTimeout(
                        () => document.getElementById("loading").remove(),
                        500,
                    );

                    addMessage("Shio", "Hi! I'm Shio. I can see you now!");
                    },
                    (xhr) => {
                        if (xhr.total) {
                            const pct = ((xhr.loaded / xhr.total) * 100).toFixed(0);
                            console.log(`Model loading: ${pct}% (${xhr.loaded} / ${xhr.total} bytes)`);
                        } else {
                            console.log(`Model loading: ${xhr.loaded} bytes received so far`);
                        }
                    },
                    (error) => {
                        console.error("Failed to load VRM model from", url, error);
                        showLoadError(
                            "Shio's 3D model failed to load. This is usually a network problem or the model file being unreachable.",
                        );
                    },
                );
            }

            function showLoadError(message) {
                const loadingEl = document.getElementById("loading");
                if (loadingEl) {
                    loadingEl.innerHTML = `
                        <p style="color:#fca5a5; text-align:center; max-width:320px; padding:0 20px; font-size:14px; line-height:1.6;">
                            ${message}<br><br>Tap "View error log" in the top right for details.
                        </p>
                    `;
                    loadingEl.style.opacity = "1";
                }
                const toggleBtn = document.getElementById("debug-toggle");
                if (toggleBtn) toggleBtn.classList.add("has-error");
            }

            function onWindowResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }

            // --- ADVANCED ANIMATION LOGIC ---
            // This handles transitioning from one pose to another
            function triggerPose(poseName) {
                if (!poseLibrary[poseName]) return;

                // Clear any existing timer when a new pose is triggered
                if (poseTimer) {
                    clearTimeout(poseTimer);
                }

                currentPose = poseName;
                targetPoseData = poseLibrary[poseName];
                isTransitioning = true;

                // Auto-return to neutral after duration, unless it's a persistent state
                if (poseName !== "neutral") {
                    poseTimer = setTimeout(() => {
                        triggerPose("neutral");
                    }, POSE_DURATION);
                }
            }

            function updatePoseAnimation(deltaTime) {
                if (!isTransitioning || !currentVrm || !targetPoseData) return;

                const humanoid = currentVrm.humanoid;
                const expressionManager = currentVrm.expressionManager;
                let maxDiff = 0;

                for (const [key, data] of Object.entries(targetPoseData)) {
                    // 1. Handle Expressions
                    if (key === "expressions" && expressionManager) {
                        for (const [expName, targetValue] of Object.entries(data)) {
                            // Skip lip-sync expressions if speaking
                            if (isSpeaking && (
                                expName === VRMExpressionPresetName.Aa ||
                                expName === VRMExpressionPresetName.Ih ||
                                expName === VRMExpressionPresetName.Ou ||
                                expName === VRMExpressionPresetName.Ee ||
                                expName === VRMExpressionPresetName.Oh
                            )) continue;

                            const currentVal = expressionManager.getValue(expName) || 0;
                            const diff = Math.abs(currentVal - targetValue);
                            if (diff > maxDiff) maxDiff = diff;

                            // SMOOTHER: Use SMOOTHING_FACTOR instead of 0.1
                            const newVal = THREE.MathUtils.lerp(
                                currentVal,
                                targetValue,
                                SMOOTHING_FACTOR, 
                            );
                            expressionManager.setValue(expName, newVal);
                        }
                        continue;
                    }

                    // 2. Handle Bones
                    const node = humanoid.getNormalizedBoneNode(key);
                    if (node) {
                        let rot = null;
                        let pos = null;

                        if (data.rotation || data.position) {
                            if (data.rotation) rot = data.rotation;
                            if (data.position) pos = data.position;
                        } else {
                            rot = data;
                        }

                        // 1. Handle Rotation
                        if (rot) {
                            const targetQ = new THREE.Quaternion().setFromEuler(
                                new THREE.Euler(rot.x, rot.y, rot.z),
                            );
                            
                            const angle = node.quaternion.angleTo(targetQ);
                            if (angle > maxDiff) maxDiff = angle;

                            // SMOOTHER: Use SMOOTHING_FACTOR instead of 0.1
                            node.quaternion.slerp(targetQ, SMOOTHING_FACTOR);
                        }

                        // 2. Handle Position
                        if (pos) {
                            const targetPos = new THREE.Vector3(
                                pos.x,
                                pos.y,
                                pos.z,
                            );
                            
                            const dist = node.position.distanceTo(targetPos);
                            if (dist > maxDiff) maxDiff = dist;

                            // SMOOTHER: Use SMOOTHING_FACTOR instead of 0.1
                            node.position.lerp(targetPos, SMOOTHING_FACTOR);
                        }
                    }
                }

                // Check if we've reached the pose
                if (isTransitioning && maxDiff < POSE_THRESHOLD) {
                    isTransitioning = false;
                }
            }

            // --- ANIMATION LOOP ---
            function animate() {
                requestAnimationFrame(animate);
                const deltaTime = clock.getDelta();
                const time = clock.elapsedTime;

                if (currentVrm) {
                    // 1. Update LookAt
                    if (currentVrm.lookAt) {
                        currentVrm.lookAt.target.position.lerp(
                            lookAtTarget,
                            SMOOTHING_FACTOR,
                        );
                    }

                    // 2. Head Tracking
                    const head = currentVrm.humanoid.getNormalizedBoneNode(
                        VRMHumanBoneName.Head,
                    );
                    if (head) {
                        const limit = 0.5;
                        const targetX = THREE.MathUtils.clamp(
                            -mouse.y * 0.3,
                            -limit,
                            limit,
                        );
                        const targetY = THREE.MathUtils.clamp(
                            mouse.x * 0.5,
                            -limit,
                            limit,
                        );

                        // Blend tracking with pose animation
                        head.rotation.x = THREE.MathUtils.lerp(
                            head.rotation.x,
                            targetX,
                            SMOOTHING_FACTOR,
                        );
                        head.rotation.y = THREE.MathUtils.lerp(
                            head.rotation.y,
                            targetY,
                            SMOOTHING_FACTOR,
                        );
                    }

                    // 3. Idle Animation (Breathing)
                    const spine = currentVrm.humanoid.getNormalizedBoneNode(
                        VRMHumanBoneName.Spine,
                    );
                    if (spine) {
                        const breath = Math.sin(time * 1.5) * 0.03;
                        spine.rotation.x = breath;
                    }

                    // 4. Advanced Pose Animation System
                    updatePoseAnimation(deltaTime);
                    
                    // 5. IMPROVED LIP SYNC LOGIC
                    // Continuous oscillation when speaking, instead of event-based
                    if (currentVrm.expressionManager) {
                        if (isSpeaking) {
                            // Create a complex wave for more natural mouth movement
                            const wave = Math.sin(time * 20) + Math.sin(time * 10) * 0.5;
                            // Normalize to 0-1 range roughly, but keep it punchy
                            const mouthOpen = Math.max(0, wave * 0.4 + 0.2); 
                            
                            // Apply primarily to 'aa' and 'ih' for generic talking
                            currentVrm.expressionManager.setValue(VRMExpressionPresetName.Aa, mouthOpen);
                            currentVrm.expressionManager.setValue(VRMExpressionPresetName.Ih, mouthOpen * 0.3);
                        } else {
                            // Decay to closed when not speaking
                            const currentAa = currentVrm.expressionManager.getValue(VRMExpressionPresetName.Aa);
                            const currentIh = currentVrm.expressionManager.getValue(VRMExpressionPresetName.Ih);
                            
                            if (currentAa > 0.01) currentVrm.expressionManager.setValue(VRMExpressionPresetName.Aa, currentAa * 0.8);
                            else currentVrm.expressionManager.setValue(VRMExpressionPresetName.Aa, 0);

                            if (currentIh > 0.01) currentVrm.expressionManager.setValue(VRMExpressionPresetName.Ih, currentIh * 0.8);
                            else currentVrm.expressionManager.setValue(VRMExpressionPresetName.Ih, 0);
                        }
                    }

                    // Blink logic
                    if (Math.random() < 0.01) blink();

                    currentVrm.update(deltaTime);
                }

                controls.update();
                renderer.render(scene, camera);
            }

            function blink() {
                if (!currentVrm || !currentVrm.expressionManager) return;
                const expressionManager = currentVrm.expressionManager;
                let t = 0;

                // Quick blink animation
                const interval = setInterval(() => {
                    t += 0.05;
                    const value = Math.sin(t * Math.PI) * 1.0;
                    expressionManager.setValue(
                        VRMExpressionPresetName.Blink,
                        Math.max(0, value),
                    );

                    if (t >= 1) {
                        clearInterval(interval);
                        expressionManager.setValue(
                            VRMExpressionPresetName.Blink,
                            0,
                        );
                    }
                }, 16);
            }

            // --- CHAT & UI LOGIC ---
            function addMessage(sender, text, isUser = false) {
                const history = document.getElementById("chat-history");
                const msgDiv = document.createElement("div");
                msgDiv.className = `message ${isUser ? "user-msg" : "ai-msg"}`;
                msgDiv.textContent = text;
                history.appendChild(msgDiv);
                history.scrollTop = history.scrollHeight;
            }

            function handleInput() {
                const inputField = document.getElementById("text-input");
                const text = inputField.value.trim();
                if (!text) return;

                addMessage("You", text, true);
                inputField.value = "";

                // Brain processing
                const reply = BRAIN.getReply(text);

                setTimeout(() => {
                    addMessage("Shio", reply.text);

                    // Trigger Animation
                    if (reply.anim) {
                        triggerPose(reply.anim);
                    }

                    // Speak using the new NaturalVoice system
                    NaturalVoice.speak(reply.text);
                }, 500);
            }

            init().catch((e) => {
                console.error("Fatal error during startup:", e);
                showLoadError(
                    "Shio failed to start up. This usually means a script or resource above failed.",
                );
            });
        </script>
    </body>
</html>
